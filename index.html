<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>감각에 집중해! - Sensory Relaxation with Hand Tracking</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- MediaPipe Hands Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="webcam-status">Webcam Initializing...</div>
    
    <main>
        <div class="sensory-center">
            <h1 class="main-typography">잘 쉬고 싶다면?<br><span>먼저 감각에 집중해!</span></h1>
        </div>
        
        <div class="pentagon-container">
            <geometric-shape type="circle" color="--shape-1" style="--angle: 0deg;"></geometric-shape>
            <geometric-shape type="square" color="--shape-2" style="--angle: 72deg;"></geometric-shape>
            <geometric-shape type="triangle" color="--shape-3" style="--angle: 144deg;"></geometric-shape>
            <geometric-shape type="hexagon" color="--shape-4" style="--angle: 216deg;"></geometric-shape>
            <geometric-shape type="star" color="--shape-5" style="--angle: 288deg;"></geometric-shape>
        </div>

        <!-- Hand Marker (Hidden by default, used for feedback) -->
        <div id="hand-pointer"></div>
    </main>

    <!-- Hidden Video Element for Webcam -->
    <video id="input-video" class="input_video" style="display:none;"></video>

    <script type="module" src="main.js"></script>
</body>
</html>
